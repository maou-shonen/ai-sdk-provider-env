name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run lint
      - run: bun run typecheck
      - run: bun test src/
      - run: bun run build

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun test tests/e2e/
