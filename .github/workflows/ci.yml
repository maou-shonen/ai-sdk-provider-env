name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: maou-shonen/node-cache-action@v1
      - uses: jdx/mise-action@v2

      - run: bun install

      - run: bun run lint
      - run: bun run typecheck
      - run: bun test src/
      - run: bun run build

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6
      - uses: maou-shonen/node-cache-action@v1
      - uses: jdx/mise-action@v2

      - run: bun install

      - run: bun test tests/e2e/
