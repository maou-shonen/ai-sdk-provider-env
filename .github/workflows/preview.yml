name: Preview Release

on:
  push:
    branches: ['**']
    tags: ['!**']
  pull_request:

permissions: {}

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - run: bun run build
      - run: bunx pkg-pr-new publish
