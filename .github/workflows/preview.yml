name: Preview Release

on:
  push:
    branches: ['**']
    tags: ['!**']
  pull_request:

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: maou-shonen/node-cache-action@v1
      - uses: jdx/mise-action@v2

      - run: bun install
      - run: bun run build
      - run: bunx pkg-pr-new publish
