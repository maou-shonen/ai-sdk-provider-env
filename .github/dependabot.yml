version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      ai-sdk:
        patterns:
          - ai
          - '@ai-sdk/*'
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - ai
          - '@ai-sdk/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
